<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lighting-Visualizer</title>
  </head>
  <body>
    <div class="main-container">
      <header>
        <h1>Lighting Visualizer</h1>
      </header>
      <div class="canvas-container">
        <canvas id="bg"></canvas>
      </div>
    </div>
    <aside class="sidebar">
      <h2>Controls</h2>  
      <!-- Sliders will go here later -->
      <div class="slider-container">
        <label for="lightSlider">Light Intensity:</label>
        <input type="range" id="lightSlider" name="lightSlider" min="0" max="100" value="100">
      </div>
      <select id="shading">
        <option value="flat">Flat</option>
        <option value="gouraud">Gouraud</option>
        <option value="phong">Phong</option>
      </select>
    </aside>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
