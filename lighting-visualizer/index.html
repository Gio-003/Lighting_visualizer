<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lighting-Visualizer</title>
  </head>
  <body>
    <div class="main-container">
      <header>
        <h1>Lighting Visualizer</h1>
      </header>
      <div class="canvas-container">
        <canvas id="bg"></canvas>
      </div>
    </div>
    <aside class="sidebar">
      <h2>Controls</h2>

      <div class="control-group">
        <label for="shading">Shading Model:</label>
        <select id="shading">
          <option value="flat">Flat</option>
          <option value="gouraud">Gouraud</option>
          <option value="phong" selected>Phong</option>
        </select>
      </div>

      <div class="control-group">
        <label for="lightSSlider">Light Intensity: <span id="lightSSliderValue">100</span></label>
        <input type="range" id="lightSlider" name="lightSSlider" min="0" max="100" value="100">
      </div>

      <div class="control-group">
        <h3>Material Properties</h3>
        <label for="ambient">Ambient: <span id="ambientValue">0.1</span></label>
        <input type="range" id="ambient" name="ambient" min="0" max="5" step="0.01" value="0.1">
        
        <label for="diffuse">Diffuse: <span id="diffuseValue">0.7</span></label>
        <input type="range" id="diffuse" name="diffuse" min="0" max="1" step="0.01" value="0.7">

        <label for="specular">Specular: <span id="specularValue">0.5</span></label>
        <input type="range" id="specular" name="specular" min="0" max="1" step="0.01" value="0.5">

        <label for="shininess">Shininess: <span id="shininessValue">32</span></label>
        <input type="range" id="shininess" name="shininess" min="1" max="128" value="32">
      </div>
      
      <div class="control-group">
        <h3>Display</h3>
        <div class="checkbox-container">
          <input type="checkbox" id="wireframe" name="wireframe">
          <label for="wireframe">Show Wireframe</label> 
        </div>
      </div>

    </aside>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
